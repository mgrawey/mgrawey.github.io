<div id="breadcrumbs">
  {%- assign crumbs = page.url | remove:'/index.html' | split: '/' -%}
  <a href="{{ "/" | relative_url }}">Home</a>
  {% for crumb in crumbs offset: 1 %}
    {% if forloop.last %}
      / {{ page.title | truncatewords: 3}}
    {% else %}
      / <span class="caption">{{ crumb | replace:'-',' ' | remove:'.html' | capitalize }}</span>
    {% endif %}
  {% endfor %}
  </div>
